# AI分析配置
ai:
  # 千问API配置 (阿里云百炼)
  qwen:
    api_key: "${QWEN_API_KEY}"
    model: "qwen-vl-plus"  # 视觉理解模型
    # 视频分析间隔 (秒)
    analyze_interval: 5
    # 告警阈值 - 连续N次检测不到物料触发告警
    discharge_alarm_threshold: 3

  # 告警配置
  alarm:
    # 告警器类型: speaker(默认), usb_device, gpio, ptt(语音播报)
    type: "speaker"
    enabled: true
    
    # USB声光报警器配置
    usb:
      enabled: true
      # 你的USB设备VID:PID (用USB查看工具查看)
      vendor_id: 0x1234
      product_id: 0x5678
    
    # 声音告警 (speaker模式)
    sound:
      enabled: true
      alarm_file: "/tmp/production-monitor/alerts/alarm.mp3"
      volume: 0.8
      # 告警持续时间(秒)
      duration: 5
    
    # 语音播报 (ptt模式，需要USB TTS设备或pyttsx3)
    voice:
      enabled: false
      # TTS引擎: pyttsx3, system, windows
      engine: "pyttsx3"
      # 播报语速
      rate: 150
    
    # GPIO告警 (树莓派)
    light:
      enabled: false
      gpio_pin: 18
      blink_interval: 0.2

# 流媒体服务器配置
stream:
  # 使用FLV格式 for Web播放
  format: "flv"
  # 推流地址 (可配置自己的流媒体服务器)
  push_url: "rtmp://localhost:1935/live/"
  # HLS配置
  hls:
    enabled: true
    output_path: "/tmp/production-monitor/hls"
